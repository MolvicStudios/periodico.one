# worker/wrangler.toml — Configuración del Cloudflare Worker

name = "periodico-one"
main = "index.js"
compatibility_date = "2024-01-01"

[triggers]
crons = ["0 * * * *"]   # Cada hora en punto

[[kv_namespaces]]
binding = "NOTICIAS_KV"
id = "REEMPLAZAR_CON_ID_KV"   # Obtener con: wrangler kv:namespace create NOTICIAS_KV

[env.production]
routes = [{ pattern = "api.periodico.one/*", zone_name = "periodico.one" }]

# ── Instrucciones de deploy ────────────────────────────────
#
# 1. Crear KV namespace:
#    wrangler kv:namespace create NOTICIAS_KV
#    → Copiar el ID devuelto y reemplazar arriba en 'id = "..."'
#
# 2. Añadir secrets (NUNCA hardcodear en este archivo):
#    wrangler secret put GROQ_API_KEY
#    wrangler secret put NEWS_API_KEY
#
# 3. Deploy:
#    wrangler deploy
#
# 4. Verificar cron (forzar ejecución manual):
#    wrangler dev --test-scheduled
#
# 5. Test API:
#    curl https://api.periodico.one/noticias?seccion=tecnologia
